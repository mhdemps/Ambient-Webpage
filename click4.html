<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blur</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="blur-page">
  <div class="blur-shape" id="blurShape" role="button" tabindex="0" aria-pressed="false"></div>

  <a href="index.html" class="home" aria-label="Home"></a>

  <script>
    const el = document.getElementById('blurShape');

    function toggleArmed() {
      const next = !el.classList.contains('armed');
      el.classList.toggle('armed', next);
      el.setAttribute('aria-pressed', String(next));
    }

    el.addEventListener('click', toggleArmed);
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleArmed();
      }
    });
  </script>
</body>
</html>
